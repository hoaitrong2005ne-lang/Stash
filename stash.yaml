name: Locket + YouTube

dns:
  enable: true
  ipv6: false

http:
  mitm:
    - api.revenuecat.com
    - *.revenuecat.com

script-providers:
  revenuecat:
    url: https://raw.githubusercontent.com/YOURNAME/Stash/main/revenuecat.js
    interval: 86400

script:
  - match: ^https:\/\/api\.revenuecat\.com\/.*
    name: revenuecat
    type: response
    require-body: true
    timeout: 60
    provider: revenuecat

rules:
  - DOMAIN-SUFFIX,doubleclick.net,REJECT
  - DOMAIN-SUFFIX,googleads.g.doubleclick.net,REJECT
  - DOMAIN-SUFFIX,pagead2.googlesyndication.com,REJECT
  - DOMAIN-SUFFIX,googlesyndication.com,REJECT
  - MATCH,DIRECT
