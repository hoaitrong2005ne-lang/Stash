dns:
  default-nameserver:
    - 1.1.1.1
    - 8.8.8.8
  skip-cert-verify: true

log-level: info
mode: rule

http:
  mitm:
    - api.revenuecat.com
    - "*.revenuecat.com"

scripts:

  # Locket RevenueCat Response
  - match: ^https?:\/\/api\.revenuecat\.com\/.*\/(receipts$|subscribers\/[^/]+$)
    name: revenuecat_response
    type: response
    require-body: true
    timeout: 120
    script-path: https://raw.githubusercontent.com/hoaitrong2005ne-lang/Stash/refs/heads/main/revenuecat.js

  # Locket RevenueCat Request
  - match: ^https?:\/\/api\.revenuecat\.com\/.*\/(receipts|subscribers)
    name: revenuecat_request_header
    type: request
    timeout: 120
    script-path: https://raw.githubusercontent.com/hoaitrong2005ne-lang/Stash/refs/heads/main/revenuecat.js

rules:

  # YouTube Ads
  - DOMAIN-SUFFIX,doubleclick.net,REJECT
  - DOMAIN-SUFFIX,googleads.g.doubleclick.net,REJECT
  - DOMAIN-SUFFIX,googlesyndication.com,REJECT
  - DOMAIN-SUFFIX,pagead2.googlesyndication.com,REJECT

  # RevenueCat
  - DOMAIN-SUFFIX,revenuecat.com,DIRECT

  - MATCH,DIRECT
